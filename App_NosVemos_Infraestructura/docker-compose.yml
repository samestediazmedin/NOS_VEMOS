services:
  sqlserver:
    profiles: ["sqlserver"]
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: nosvemos-sqlserver
    environment:
      ACCEPT_EULA: ${ACCEPT_EULA}
      SA_PASSWORD: ${SA_PASSWORD}
      MSSQL_PID: ${MSSQL_PID}
    ports:
      - "${SQLSERVER_HOST_PORT:-1433}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${SA_PASSWORD}", "-Q", "SELECT 1", "-C"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks:
      - nosvemos-net

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: nosvemos-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${RABBITMQ_HOST_PORT:-5673}:5672"
      - "${RABBITMQ_MANAGEMENT_HOST_PORT:-15673}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - nosvemos-net

  seq:
    image: datalust/seq:2024.2
    container_name: nosvemos-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_FIRSTRUN_ADMINPASSWORD}
    ports:
      - "${SEQ_HOST_PORT:-5341}:80"
    volumes:
      - seq_data:/data
    networks:
      - nosvemos-net

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: nosvemos-jaeger
    ports:
      - "${JAEGER_UI_HOST_PORT:-16686}:16686"
      - "${OTLP_GRPC_HOST_PORT:-4317}:4317"
      - "${OTLP_HTTP_HOST_PORT:-4318}:4318"
    networks:
      - nosvemos-net

volumes:
  sqlserver_data:
  rabbitmq_data:
  seq_data:

networks:
  nosvemos-net:
    driver: bridge
