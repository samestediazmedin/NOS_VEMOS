name: ci

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore NosVemos.sln

      - name: Build
        run: dotnet build NosVemos.sln --configuration Release --no-restore

      - name: Security verification script
        shell: pwsh
        run: ./scripts/verify-security.ps1
