<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NOS_VEMOS - Camara IA</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --accent: #22c55e;
      --muted: #94a3b8;
      --text: #e5e7eb;
      --danger: #ef4444;
      --warn: #f59e0b;
    }
    body {
      margin: 0;
      font-family: Segoe UI, sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .card {
      width: min(460px, 100%);
      background: color-mix(in oklab, var(--panel) 92%, black);
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
    }
    h1 { margin: 0 0 8px; font-size: 1.2rem; }
    p { margin: 0 0 12px; color: var(--muted); }
    video, canvas {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #020617;
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .meta {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }
    .meta input {
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 10px;
      background: #0b1220;
      color: var(--text);
    }
    .sensor {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.85rem;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .primary { background: var(--accent); color: #06210f; }
    .secondary { background: #334155; color: var(--text); }
    .output {
      margin-top: 12px;
      background: #0b1220;
      border: 1px solid #1e293b;
      border-radius: 10px;
      padding: 10px;
      white-space: pre-wrap;
      font-family: Consolas, monospace;
      font-size: 0.85rem;
    }
    .alto { color: var(--danger); }
    .medio { color: var(--warn); }
    .bajo { color: var(--accent); }
  </style>
</head>
<body>
  <main class="card">
    <h1>Camara + Analizador IA</h1>
    <p>Captura un frame y envia la imagen al Orquestador IA a traves de la Pasarela.</p>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" hidden></canvas>

    <div class="actions">
      <button id="start" class="secondary">Iniciar camara</button>
      <button id="capture" class="primary">Capturar y analizar</button>
      <button id="trainFace" class="secondary">Entrenar rostro</button>
      <button id="verifyFace" class="secondary">Detectar y aprender</button>
      <button id="loadAudit" class="secondary">Ver auditoria</button>
      <button id="loadAuditById" class="secondary">Ver detalle evento</button>
    </div>

    <div class="meta">
      <input id="token" placeholder="Bearer token (requerido para rutas protegidas en gateway)" />
      <input id="usuarioEsperado" placeholder="Usuario esperado" value="usuario_demo" />
      <input id="usuarioDetectado" placeholder="Usuario detectado por rostro" value="usuario_demo" />
      <input id="confianzaRostro" type="number" min="0" max="1" step="0.01" value="0.92" />
      <input id="auditRoutingKey" placeholder="Filtro auditoria por routingKey (opcional)" />
      <input id="auditPage" type="number" min="1" value="1" placeholder="Pagina" />
      <input id="auditPageSize" type="number" min="1" max="200" value="20" placeholder="Tamano pagina" />
      <input id="auditEventId" placeholder="Id de evento para detalle (GUID)" />
    </div>

    <div id="sensorState" class="sensor">Sensor de proximidad: no inicializado.</div>

    <div id="output" class="output">Esperando captura...</div>
    <div id="auditOutput" class="output">Auditoria: sin datos.</div>
  </main>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const output = document.getElementById("output");
    const sensorState = document.getElementById("sensorState");
    const startBtn = document.getElementById("start");
    const captureBtn = document.getElementById("capture");
    const trainFaceBtn = document.getElementById("trainFace");
    const verifyFaceBtn = document.getElementById("verifyFace");
    const loadAuditBtn = document.getElementById("loadAudit");
    const loadAuditByIdBtn = document.getElementById("loadAuditById");
    const tokenInput = document.getElementById("token");
    const usuarioEsperadoInput = document.getElementById("usuarioEsperado");
    const usuarioDetectadoInput = document.getElementById("usuarioDetectado");
    const confianzaRostroInput = document.getElementById("confianzaRostro");
    const auditRoutingKeyInput = document.getElementById("auditRoutingKey");
    const auditPageInput = document.getElementById("auditPage");
    const auditPageSizeInput = document.getElementById("auditPageSize");
    const auditEventIdInput = document.getElementById("auditEventId");
    const auditOutput = document.getElementById("auditOutput");

    let stream;
    let distanciaCm = 0;

    async function capturarFrameComoFormData() {
      if (!stream) {
        throw new Error("Primero debes iniciar la camara.");
      }

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/jpeg", 0.9));
      const formData = new FormData();
      formData.append("frame", blob, "captura.jpg");
      return formData;
    }

    function construirHeadersAutorizacion() {
      const headers = {};
      if (tokenInput.value) {
        headers.Authorization = `Bearer ${tokenInput.value}`;
      }
      return headers;
    }

    function iniciarSensorProximidad() {
      if (!("ProximitySensor" in window)) {
        sensorState.textContent = "Sensor de proximidad no soportado por este navegador/dispositivo.";
        return;
      }

      try {
        const sensor = new ProximitySensor({ frequency: 1 });
        sensor.addEventListener("reading", () => {
          distanciaCm = Number(sensor.distance || 0);
          const alerta = distanciaCm > 0 && distanciaCm < 55;
          sensorState.textContent = `Sensor de proximidad: ${distanciaCm.toFixed(2)} cm${alerta ? " (alerta)" : ""}`;
        });
        sensor.addEventListener("error", (event) => {
          sensorState.textContent = `Error en sensor: ${event.error?.name || "desconocido"}`;
        });
        sensor.start();
      } catch (error) {
        sensorState.textContent = `No se pudo iniciar sensor de proximidad: ${error.message}`;
      }
    }

    startBtn.addEventListener("click", async () => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
        video.srcObject = stream;
        output.textContent = "Camara iniciada.";
        iniciarSensorProximidad();
      } catch (error) {
        output.textContent = `No se pudo iniciar camara: ${error.message}`;
      }
    });

    captureBtn.addEventListener("click", async () => {
      try {
        const formData = await capturarFrameComoFormData();
        formData.append("usuarioEsperado", usuarioEsperadoInput.value || "");
        formData.append("usuarioDetectado", usuarioDetectadoInput.value || "");
        formData.append("confianzaRostro", confianzaRostroInput.value || "0");
        formData.append("distanciaCm", String(distanciaCm || 0));
        const headers = construirHeadersAutorizacion();

        const response = await fetch("http://localhost:7000/api/v1/ia/analizar-camara?contexto=camara_movil", {
          method: "POST",
          headers,
          body: formData
        });

        if (!response.ok) {
          const err = await response.text();
          output.textContent = `Error API: ${response.status} - ${err}`;
          return;
        }

        const data = await response.json();
        const risk = (data.evaluacion?.nivelRiesgo || "").toLowerCase();
        output.className = `output ${risk}`;
        output.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        output.textContent = `Fallo de conexion: ${error.message}`;
      }
    });

    trainFaceBtn.addEventListener("click", async () => {
      const usuario = (usuarioEsperadoInput.value || "").trim();
      if (!usuario) {
        output.textContent = "Ingresa un usuario esperado para entrenar el rostro.";
        return;
      }

      try {
        const formData = await capturarFrameComoFormData();
        formData.append("usuario", usuario);
        const headers = construirHeadersAutorizacion();

        const response = await fetch("http://localhost:7000/api/v1/ia/rostro/entrenar", {
          method: "POST",
          headers,
          body: formData
        });

        if (!response.ok) {
          const err = await response.text();
          output.textContent = `Error entrenamiento: ${response.status} - ${err}`;
          return;
        }

        const data = await response.json();
        output.className = "output";
        output.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        output.textContent = `Fallo entrenamiento: ${error.message}`;
      }
    });

    verifyFaceBtn.addEventListener("click", async () => {
      try {
        const formData = await capturarFrameComoFormData();
        formData.append("usuarioEsperado", usuarioEsperadoInput.value || "");
        const headers = construirHeadersAutorizacion();

        const response = await fetch("http://localhost:7000/api/v1/ia/rostro/verificar", {
          method: "POST",
          headers,
          body: formData
        });

        if (!response.ok) {
          const err = await response.text();
          output.textContent = `Error verificacion: ${response.status} - ${err}`;
          return;
        }

        const data = await response.json();
        output.className = `output ${data.esExacto ? "bajo" : "medio"}`;
        output.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        output.textContent = `Fallo verificacion: ${error.message}`;
      }
    });

    loadAuditBtn.addEventListener("click", async () => {
      try {
        const headers = construirHeadersAutorizacion();

        const params = new URLSearchParams();
        const routingKey = (auditRoutingKeyInput.value || "").trim();
        const page = Number(auditPageInput.value || 1);
        const pageSize = Number(auditPageSizeInput.value || 20);

        if (routingKey) {
          params.set("routingKey", routingKey);
        }
        params.set("page", String(page > 0 ? page : 1));
        params.set("pageSize", String(pageSize > 0 ? pageSize : 20));

        const response = await fetch(`http://localhost:7000/api/v1/auditoria/eventos?${params.toString()}`, { headers });
        if (!response.ok) {
          const err = await response.text();
          auditOutput.textContent = `Error auditoria: ${response.status} - ${err}`;
          return;
        }

        const data = await response.json();
        auditOutput.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        auditOutput.textContent = `Fallo auditoria: ${error.message}`;
      }
    });

    loadAuditByIdBtn.addEventListener("click", async () => {
      const eventId = (auditEventIdInput.value || "").trim();
      if (!eventId) {
        auditOutput.textContent = "Ingresa un id de evento para consultar detalle.";
        return;
      }

      try {
        const headers = construirHeadersAutorizacion();

        const response = await fetch(`http://localhost:7000/api/v1/auditoria/eventos/${eventId}`, { headers });
        if (!response.ok) {
          const err = await response.text();
          auditOutput.textContent = `Error detalle auditoria: ${response.status} - ${err}`;
          return;
        }

        const data = await response.json();
        auditOutput.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        auditOutput.textContent = `Fallo detalle auditoria: ${error.message}`;
      }
    });
  </script>
</body>
</html>
